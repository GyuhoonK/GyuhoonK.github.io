<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 800" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f9fafb"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
  </defs>

  <rect width="1600" height="800" fill="url(#bg)"/>

  <!-- Title -->
  <text x="800" y="120"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="56" font-weight="700" text-anchor="middle" fill="#111827">
    Is this a DAG?
  </text>
  <text x="800" y="170"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="22" font-weight="400" text-anchor="middle" fill="#6b7280">
    Cycle Detection — DFS 3-color &amp; Kahn's Algorithm
  </text>

  <!-- Forward edges A→B→C→D→E -->
  <g stroke="#374151" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <line x1="320" y1="500" x2="500" y2="500"/>
    <line x1="600" y1="500" x2="780" y2="500"/>
    <line x1="880" y1="500" x2="1060" y2="500"/>
    <line x1="1160" y1="500" x2="1340" y2="500"/>
  </g>

  <!-- Back edge E → C (curved, dashed, red) -->
  <path d="M 1390 455 Q 1110 270, 830 455"
        stroke="#dc2626" stroke-width="4" fill="none"
        stroke-dasharray="10,5" marker-end="url(#arrow-red)"/>
  <text x="1110" y="305"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="26" font-weight="600" fill="#dc2626" text-anchor="middle">
    back-edge → cycle!
  </text>

  <!-- Nodes -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
     font-size="38" font-weight="600" text-anchor="middle">
    <!-- A: BLACK (visited / done) -->
    <circle cx="270" cy="500" r="50" fill="#1f2937" stroke="#111827" stroke-width="2"/>
    <text x="270" y="514" fill="#ffffff">A</text>

    <!-- B: BLACK -->
    <circle cx="550" cy="500" r="50" fill="#1f2937" stroke="#111827" stroke-width="2"/>
    <text x="550" y="514" fill="#ffffff">B</text>

    <!-- C: GRAY (in current DFS path) -->
    <circle cx="830" cy="500" r="50" fill="#9ca3af" stroke="#374151" stroke-width="2"/>
    <text x="830" y="514" fill="#ffffff">C</text>

    <!-- D: GRAY -->
    <circle cx="1110" cy="500" r="50" fill="#9ca3af" stroke="#374151" stroke-width="2"/>
    <text x="1110" y="514" fill="#ffffff">D</text>

    <!-- E: GRAY -->
    <circle cx="1390" cy="500" r="50" fill="#9ca3af" stroke="#374151" stroke-width="2"/>
    <text x="1390" y="514" fill="#ffffff">E</text>
  </g>

  <!-- Legend -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
     font-size="20" fill="#4b5563">
    <circle cx="430" cy="700" r="14" fill="#1f2937"/>
    <text x="455" y="707">BLACK · 탐색 완료</text>

    <circle cx="730" cy="700" r="14" fill="#9ca3af"/>
    <text x="755" y="707">GRAY · 현재 DFS 경로</text>

    <line x1="1080" y1="700" x2="1130" y2="700"
          stroke="#dc2626" stroke-width="3" stroke-dasharray="8,4"/>
    <text x="1145" y="707">back-edge (cycle 발견)</text>
  </g>
</svg>
